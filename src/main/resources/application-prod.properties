spring.application.name=torneo

#ConfiguraciÃ³n de BD
spring.datasource.url=jdbc:mysql://localhost:3306/torneo
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Mostrar las sentencias SQL en los logs
spring.jpa.show-sql=true

#Generar las tablas automaticamente a partir de las entidades
spring.jpa.hibernate.ddl-auto=update

#Mostrar logs
logging.level.org.hibernate.SQL=debug


spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.upload.dir=uploads

# ===== JWT =====
# En producción usar una clave fuerte y guardada como variable de entorno
jwt.secret=${JWT_SECRET:cambia-esta-clave-en-produccion-por-variable-de-entorno}
jwt.expiration-ms=86400000
