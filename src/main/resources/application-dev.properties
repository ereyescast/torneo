spring.application.name=torneo
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.jackson.serialization.fail-on-empty-beans=false

# ===== H2 (DESARROLLO) =====
spring.datasource.url=jdbc:h2:file:./data/torneo
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== UPLOAD =====
app.upload.dir=uploads

# ===== JWT =====
# En dev: usa la variable de entorno JWT_SECRET si existe,
# sino usa el valor por defecto solo para desarrollo local.
# NUNCA usar el valor por defecto en producciˇn.
jwt.secret=${JWT_SECRET:dev-secret-key-solo-para-desarrollo-local-2026}
jwt.expiration-ms=86400000
